<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'" />
    <meta name="referrer" content="origin" />
    <meta name="description" content="관심 부동산의 실거래, 전월세, 입지 점수, 뉴스 변화를 한 번에 추적하는 개인 부동산 모니터링 앱" />
    <title>부동산 모니터</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="landing-page">
    <header class="landing-nav">
      <a class="landing-brand" href="/" aria-label="부동산 모니터 홈">
        <span class="landing-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="presentation" focusable="false">
            <path d="M4 12.5 12 5l8 7.5v6.5H4z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
            <path d="M9 20v-5h6v5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M8.5 14.5 12 11l3.5 3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
        <strong>부동산 모니터</strong>
      </a>
      <nav aria-label="랜딩 메뉴">
        <a class="landing-nav-cta" href="/app">앱 열기</a>
      </nav>
    </header>

    <main>
      <section class="landing-hero">
        <div class="landing-copy">
          <p class="landing-kicker">관심 자산 모니터</p>
          <h1>부동산 모니터</h1>
          <p class="landing-lead">
            관심 자산의 실거래, 전월세, 임장 기록, 뉴스 변화를 한 화면에서 확인합니다.
          </p>
          <div class="landing-actions">
            <a class="landing-primary" href="/app">앱 열기</a>
          </div>
          <div class="landing-points" aria-label="핵심 기능">
            <span>실거래 · 전월세</span>
            <span>임장 · 사진</span>
            <span>뉴스 · 알림</span>
          </div>
        </div>

        <div class="landing-visual" aria-label="부동산 모니터 앱 미리보기">
          <div class="landing-phone">
            <div class="phone-status">
              <span>관심 지도</span>
              <strong>5곳</strong>
            </div>
            <div class="mini-map">
              <span class="mini-road road-one"></span>
              <span class="mini-road road-two"></span>
              <span class="mini-road road-three"></span>
              <span class="mini-pin pin-one"></span>
              <span class="mini-pin pin-two"></span>
              <span class="mini-pin pin-three"></span>
              <div class="mini-card">
                <strong>성남단대푸르지오</strong>
                <span>84㎡ · 실거래 추적 중</span>
              </div>
            </div>
            <div class="phone-metrics">
              <div>
                <small>최근 실거래</small>
                <strong>8.7억</strong>
              </div>
              <div>
                <small>전월세</small>
                <strong>4.8억</strong>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
